<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <script src="document.js" defer></script>
    <title>Document Editor</title>
</head>

<body>
    <div class="button box">
        <a href="index.html">
            <img src="icons8-word-file-100.png" width="50" height="50" alt="logo">
        </a>
        <div>
            <h3 id="doc-title">Document 1</h3>
            <p class="file-tool">File</p>
            <p class="file-tool">Edit</p>
            <p class="file-tool">View</p>
            <p class="file-tool">Insert</p>
            <p class="file-tool">Format</p>
            <p class="file-tool">Tools</p>
            <p class="file-tool">Extensions</p>
            <p class="file-tool">Zotero</p>
            <p class="file-tool">Help</p>
        </div>
        <img src="icons8-user-48.png" width="30" height="30" class="user-profile" alt="user profile">
    </div>

    <div>
        <div class="tool-search">
            <img src="icons8-search-48.png" class="toolsearch-icon" width="20" height="20" alt="search">
            <p class="search-text">Menus</p>
            <img src="icons8-undo-60.png" class="undo" width="20" height="20">
            <img src="icons8-redo-60.png" class="redo" width="20" height="20">
            <img src="icons8-print-48.png" class="redo" width="20" height="20">
            <div class="choice-box">
                <p class="search-text">100%</p>
                <img src="icons8-down-arrow-48.png" class="more" width="20" height="20">
            </div>
            <div class="choice-box">
                <p class="search-text">Normal text</p>
                <img src="icons8-down-arrow-48.png" class="more" width="20" height="20">
            </div>
            <div class="choice-box">
                <p class="search-text">Arial</p>
                <img src="icons8-down-arrow-48.png" class="more" width="20" height="20">
            </div>
            <div class="choice-box">
                <img src="icons8-plus-48.png" class="more" width="20" height="20">
                <p class="fontsize-text">11</p>
                <img src="icons8-minus-48.png" class="more" width="20" height="20">
            </div>
            <div class="choice-box">
                <img src="icons8-bold-48.png" class="font-edit" width="20" height="20">
                <img src="icons8-italic-48.png" class="font-edit" width="20" height="20">
                <img src="icons8-underline-48.png" class="font-edit" width="20" height="20">
                <p class="textcolor-text">A</p>
                <img src="icons8-highlight-48.png" class="font-edit" width="20" height="20">
            </div>
            <div class="choice-box">
                <img src="icons8-link-48.png" class="font-edit" width="20" height="20">
                <img src="icons8-comment-48.png" class="font-edit" width="20" height="20">
                <img src="icons8-image-48.png" class="font-edit" width="20" height="20">
                <p class="zotero-text">Z</p>
            </div>
            <div class="choice-box">
                <img src="icons8-align-left-48.png" class="font-edit" width="20" height="20">
                <img src="icons8-down-arrow-48.png" class="arrow" width="20" height="20">
                <img src="icons8-spacing-48.png" class="font-edit" width="20" height="20">
                <img src="icons8-checklist-48.png" class="font-edit" width="20" height="20">
                <img src="icons8-down-arrow-48.png" class="arrow" width="20" height="20">
                <img src="icons8-bulleted-list-48.png" class="font-edit" width="20" height="20">
                <img src="icons8-down-arrow-48.png" class="arrow" width="20" height="20">
                <img src="icons8-numbered-list-48.png" class="font-edit" width="20" height="20">
                <img src="icons8-down-arrow-48.png" class="arrow" width="20" height="20">
                <img src="icons8-indent-48.png" class="font-edit" width="20" height="20">
            </div>
        </div>
    </div>

    <div class="doc-image-container">
        <img id="doc-image" src="" alt="doc-image">
    </div>
</body>
